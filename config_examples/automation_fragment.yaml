- id: "<YOUR AUTOMATION ID>"
  alias: generate forecats
  description: ''
  # Fires at the top of every hour; the condition below gates it to scheduled slots.
  # Set check_interval_hours to match your ESPHome device's check_interval_hours substitution.
  triggers:
    - trigger: time_pattern
      minutes: "0"
  variables:
    trigger_time_str: "05:00:00"   # Change to your desired start time (hour is used)
    check_interval_hours: 24       # Match to ESPHome check_interval_hours (1-24)
  conditions:
    - condition: template
      value_template: >
        {% set start_hour = trigger_time_str.split(':')[0] | int %}
        {% set interval = check_interval_hours | int %}
        {% set current_hour = now().hour %}
        {% set hours_since_start = ((current_hour - start_hour) % 24 + 24) % 24 %}
        {{ hours_since_start % interval == 0 }}
  actions:
    - action: weather.get_forecasts
      metadata: {}
      data:
        type: daily
      target:
        entity_id: weather.forecast_home
      response_variable: todays_forecast
    - action: forecats.generate_pet_picture
      data:
        gemini_api_key: "<YOUR API KEY>"
        location: "<YOUR LOCATION>"
        forecast: "{{ todays_forecast['weather.forecast_home'].forecast[0] }}"
        temperature_unit: "{{ state_attr('weather.forecast_home', 'temperature_unit') }}"
        pets:
          - name: "<PET 1>"
            type: "<PET 1 TYPE> (default: cat)"
            description: >
              <PET 1 DESCRIPTION>
          - name: "<PET 2>"
            type: "<PET 2 TYPE> (default: cat)"
            description: >
              <PET 2 DESCRIPTION>
          - "<...>"
        input_image_paths:
          - "/config/forecats_data/input_images/<PET1>.jpg"
          - "/config/forecats_data/input_images/<PET1 and <PET2>.jpg"
          - "/config/forecats_data/input_images/<PET2>.jpg"
          - "<...>" # Up to 14 images total
        art_styles:
          - "comic book"
          - "anime"
          - "pixar"
          - "watercolor"
          - "ghibli"
          - "disney"
          - "<...>" # As many animation styles as you want
        image_gen_aspect_ratio: "16:9"
        image_gen_resolution: "1K"
        final_image_size: "800x480" # Or whatever you want, as long as its <= image_gen_resolution
        display_profile: "spectra6" # Currently supports null (original image) or "spectra6"
  mode: single

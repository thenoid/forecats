substitutions:
  # Device identity — override in your personal config
  device_name: e-ink-frame
  device_friendly_name: e-ink frame
  wifi_ap_ssid: "E-Ink-Frame Fallback Hotspot"

  # Image URL — set to your HA local or Nabu Casa URL
  image_url: http://homeassistant:8123/local/daily_forecats/forecats_optimized.png

  # Timezone — set to your local timezone
  timezone: "America/Toronto"

  # Schedule — match check_interval_hours to the blueprint setting
  wake_hour: "5"             # Hour to start daily check (0-23, local time)
  wake_minute: "15"          # Minutes past the hour — keep at 15 so the HA automation
                             # (which runs at :00) has time to finish generating
  check_interval_hours: "24" # How often to check in hours (1-24)


esphome:
  name: ${device_name}
  friendly_name: ${device_friendly_name}
  on_boot:
    priority: -100
    then:
      - light.turn_on: onboard_led
      - logger.log: "Device booted"
      - script.execute: update_battery_status
      - wait_until:
          condition:
            wifi.connected:
          timeout: 30s
      - wait_until:
          condition:
            lambda: 'return id(ha_time).now().is_valid();'
          timeout: 30s
      - script.execute: check_and_update_image
      - script.wait: check_and_update_image
      - wait_until:
          condition:
            lambda: 'return id(download_complete);'
          timeout: 60s
      - logger.log: "Entering deep sleep until next scheduled check"
      - light.turn_off: onboard_led
      - deep_sleep.enter:
          id: deep_sleep_ctrl
          sleep_duration: !lambda |-
            if (!id(ha_time).now().is_valid()) {
              ESP_LOGW("forecats", "Time not valid, sleeping for full interval");
              return (uint32_t)(${check_interval_hours} * 3600000UL);
            }
            auto now = id(ha_time).now();
            int current_minutes = now.hour * 60 + now.minute;
            int start_minutes = ${wake_hour} * 60 + ${wake_minute};
            int interval_minutes = ${check_interval_hours} * 60;
            int diff = current_minutes - start_minutes;
            int minutes_past = ((diff % interval_minutes) + interval_minutes) % interval_minutes;
            int sleep_minutes = interval_minutes - minutes_past;
            if (sleep_minutes < 1) sleep_minutes = interval_minutes;
            ESP_LOGI("forecats", "Sleeping for %d minutes until next check", sleep_minutes);
            return (uint32_t)(sleep_minutes * 60000UL);


esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: esp-idf

logger:
  level: DEBUG

psram:
  mode: octal
  speed: 80MHz

# Enable Home Assistant API
api:
  encryption:
    key: ""

ota:
  - platform: esphome
    password: ""

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  on_connect:
    then:
      - logger.log: "WiFi connected successfully"
  ap:
    ssid: ${wifi_ap_ssid}
    password: ""

captive_portal:


spi:
  clk_pin: GPIO7
  mosi_pin: GPIO9


display:
  - platform: epaper_spi
    id: epaper_display
    model: Seeed-reTerminal-E1002
    update_interval: never
    cs_pin: GPIO10
    dc_pin: GPIO11
    reset_pin:
      number: GPIO12
      inverted: false
    busy_pin:
      number: GPIO13
      inverted: true
      mode:
        input: true
        pullup: true
    lambda: |-
      it.image(0, 0, id(forecats_image));


output:
  - platform: gpio
    pin: GPIO6
    id: led_output
    inverted: true
  - platform: gpio
    pin: GPIO21
    id: bsp_battery_enable


globals:
  - id: last_known_version
    type: std::string
    restore_value: true
    initial_value: '""'
  - id: download_complete
    type: bool
    restore_value: no
    initial_value: 'true'


# IMAGE DOWNLOAD LOGIC
http_request:
  verify_ssl: false
  timeout: 20s
  watchdog_timeout: 25s

online_image:
  - id: forecats_image
    format: PNG
    type: RGB
    buffer_size: 65536
    url: ${image_url}
    on_download_finished:
      - component.update: epaper_display
      - globals.set:
          id: download_complete
          value: 'true'


# BUTTON LOGIC
# Green button is deep sleep wakeup
# Right white button is manual update image
# Left white button is sleep until 5:00am
binary_sensor:
  - platform: gpio
    pin:
      number: GPIO4 # Right white button
      mode: INPUT_PULLUP
    name: "Manual Update Button"
    filters:
      - delayed_on: 50ms
    on_press:
      then:
        - logger.log: "Manual Update Button Pressed"
        - component.update: forecats_image
  - platform: gpio
    pin:
      number: GPIO5 # Left white button
      mode: INPUT_PULLUP
    name: "Sleep Until Next Check Button"
    internal: true
    filters:
      - delayed_on: 50ms
    on_press:
      then:
        - logger.log: "Sleep Until Next Check Button Pressed"
        - delay: 10s
        - light.turn_off: onboard_led
        - deep_sleep.enter:
            id: deep_sleep_ctrl
            sleep_duration: !lambda |-
              if (!id(ha_time).now().is_valid()) {
                return (uint32_t)(${check_interval_hours} * 3600000UL);
              }
              auto now = id(ha_time).now();
              int current_minutes = now.hour * 60 + now.minute;
              int start_minutes = ${wake_hour} * 60 + ${wake_minute};
              int interval_minutes = ${check_interval_hours} * 60;
              int diff = current_minutes - start_minutes;
              int minutes_past = ((diff % interval_minutes) + interval_minutes) % interval_minutes;
              int sleep_minutes = interval_minutes - minutes_past;
              if (sleep_minutes < 1) sleep_minutes = interval_minutes;
              return (uint32_t)(sleep_minutes * 60000UL);


# DEEP SLEEP LOGIC
deep_sleep:
  id: deep_sleep_ctrl # Green button
  wakeup_pin: GPIO3
  wakeup_pin_mode: INVERT_WAKEUP

time:
  - platform: homeassistant
    id: ha_time
    timezone: ${timezone}


# LED LOGIC
light:
  - platform: binary
    name: "Onboard LED"
    internal: true
    output: led_output
    id: onboard_led


# BATTERY LOGIC
sensor:
  - platform: adc
    pin: GPIO1
    name: "Battery Voltage"
    id: battery_voltage
    internal: true
    update_interval: never
    attenuation: 12db
    filters:
      - multiply: 2.0
  - platform: template
    name: "Battery Level"
    id: battery_level
    unit_of_measurement: "%"
    icon: "mdi:battery"
    device_class: battery
    state_class: measurement
    lambda: 'return id(battery_voltage).state;'
    update_interval: never
    filters:
      - calibrate_linear:
          - 4.15 -> 100.0
          - 3.96 -> 90.0
          - 3.91 -> 80.0
          - 3.85 -> 70.0
          - 3.80 -> 60.0
          - 3.75 -> 50.0
          - 3.68 -> 40.0
          - 3.58 -> 30.0
          - 3.49 -> 20.0
          - 3.41 -> 10.0
          - 3.30 -> 5.0
          - 3.27 -> 0.0
      - clamp:
          min_value: 0
          max_value: 100

script:
  - id: update_battery_status
    mode: single
    then:
      - logger.log: "Starting battery measurement routine."
      - output.turn_on: bsp_battery_enable
      - delay: 50ms
      - component.update: battery_voltage
      - component.update: battery_level
      - output.turn_off: bsp_battery_enable
      - logger.log: "Battery status measured and circuit disabled."

  - id: check_and_update_image
    mode: single
    then:
      - logger.log: "Checking for image update via HEAD request..."
      - http_request.send:
          method: HEAD
          url: ${image_url}
          on_response:
            then:
              - lambda: |-
                  for (const auto& header : response->headers) {
                    if (header.name == "Last-Modified") {
                      std::string last_mod = header.value;
                      if (last_mod != id(last_known_version)) {
                        ESP_LOGI("forecats", "Image changed: %s", last_mod.c_str());
                        id(last_known_version) = last_mod;
                        id(download_complete) = false;
                        id(forecats_image).update();
                      } else {
                        ESP_LOGI("forecats", "No change detected, skipping update.");
                      }
                      return;
                    }
                  }
                  ESP_LOGW("forecats", "Last-Modified header not found in response.");

generate_pet_picture:
  name: Generate Pet Picture
  description: Generate a weather-themed pet picture
  fields:
    location:
      description: Location for weather context
      example: "Toronto, Ontario, Canada"
      required: true
      selector:
        text:
    forecast:
      description: Weather forecast data
      required: true
    temperature_unit:
      description: Temperature unit (e.g., "C" or "F")
      required: true
    pets:
      description: "list of your pets, each pet must have a name and description, and can have a type (default: cat)"
      required: true
      selector:
        object:
          label_field: name
          description_field: type
          multiple: true
          fields:
            name:
              label: Name
              selector:
                text:
            type:
              label: Type
              selector:
                text:
            description:
              label: Description
              selector:
                text:
    input_image_dir:
      description: >
        Path to a directory of reference pet images. All image files (jpg, png, webp,
        etc.) in the directory will be used. Upload via HA Media Browser to
        /config/media/ and reference the folder here (e.g. /config/media/forecats).
      required: false
      selector:
        text:
    input_image_paths:
      description: >
        Explicit list of paths to reference images. Use this or input_image_dir
        (or both).
      required: false
      selector:
        object:
    art_styles:
      description: List of art styles to choose from
      required: true
      selector:
        object:
    image_gen_aspect_ratio:
      description: Aspect ratio for generated image
      default: "16:9"
      selector:
        text:
    image_gen_resolution:
      description: Resolution for generated image
      default: "1K"
      selector:
        text:
    final_image_size:
      description: Final output image size
      default: "1K"
      example: "800x480"
      selector:
        text:
    display_profile:
      description: Display profile (null or "spectra6")
      required: true
      default: null
      example: "spectra6"
      selector:
        text:
blueprint:
  name: Daily Forecats
  description: >
    Generate a daily AI weather-themed illustration of your pets using the
    Forecats integration. Fetches today's forecast from a weather entity and
    calls the `forecats.generate_pet_picture` service on a configurable schedule.
  domain: automation
  source_url: https://github.com/jwardbond/forecats/blob/master/blueprints/automation/forecats/forecats.yaml
  input:
    trigger_time:
      name: Generation time
      description: >
        Time of day to generate the first image each day. The hour portion is
        used as the anchor for repeat intervals — e.g. if set to 05:00 with a
        6-hour interval, images are generated at 05:00, 11:00, 17:00, 23:00.
      default: "05:00:00"
      selector:
        time: {}

    check_interval_hours:
      name: Check interval
      description: >
        How many hours between image regenerations. Set to 24 for once daily.
        Match this to the check_interval_hours substitution in your ESPHome
        device config so the device and automation stay in sync.
      default: 24
      selector:
        number:
          min: 1
          max: 24
          step: 1
          unit_of_measurement: hours
          mode: box

    weather_entity:
      name: Weather entity
      description: The weather entity to pull today's forecast from (e.g. weather.forecast_home).
      selector:
        entity:
          domain: weather

    gemini_api_key:
      name: Gemini API key
      description: Your Google AI Studio API key.
      selector:
        text: {}

    location:
      name: Location
      description: Your location for weather context (e.g. "Toronto, Ontario, Canada").
      selector:
        text: {}

    pets:
      name: Pets
      description: >
        List of pets. Each entry must have a `name` and `description`, and
        optionally a `type` (defaults to "cat"). Example:

          - name: Milo
            type: cat
            description: An orange tabby who loves blankets
          - name: Brutus
            type: dog
            description: A large black lab who is always hungry
      selector:
        object: {}

    input_image_dir:
      name: Input image directory
      description: >
        Path to a folder of pet reference images. All image files in the folder
        will be used.

        New (no SSH): create a "forecats" folder in the HA Media Browser (Local
        Media) and set this to /config/media/forecats

        Legacy: set this to /config/forecats_data/input_images/ if you already
        have images there.

        Leave blank if using explicit paths below instead.
      default: ""
      selector:
        text: {}

    input_image_paths:
      name: Input image paths
      description: >
        Explicit list of file paths to reference images of your pets (up to 14
        total). Use this or Input image directory (or both). Example:

          - /config/forecats_data/input_images/milo.jpg
          - /config/forecats_data/input_images/brutus.jpg
      default: []
      selector:
        object: {}

    art_styles:
      name: Art styles
      description: >
        List of art styles to randomly choose from each day.
      default:
        - comic book
        - anime
        - pixar
        - watercolor
        - ghibli
        - disney
      selector:
        object: {}

    image_gen_aspect_ratio:
      name: Image aspect ratio
      description: Aspect ratio for the generated image.
      default: "16:9"
      selector:
        select:
          options:
            - "1:1"
            - "3:4"
            - "4:3"
            - "9:16"
            - "16:9"

    image_gen_resolution:
      name: Image resolution
      description: Resolution of the generated image.
      default: "1K"
      selector:
        select:
          options:
            - "1K"
            - "2K"
            - "4K"

    final_image_size:
      name: Final image size
      description: >
        Output dimensions after cropping/resizing (e.g. "800x480"). Must be
        less than or equal to the image resolution.
      default: "800x480"
      selector:
        text: {}


    activity_model:
      name: Activity model
      description: Gemini model used to generate the activity text prompt.
      default: "gemini-2.5-flash-lite"
      selector:
        text: {}

    image_model:
      name: Image model
      description: Gemini image model used to generate the final illustration.
      default: "gemini-3-pro-image-preview"
      selector:
        text: {}

    max_image_retries:
      name: Max image retries
      description: Number of retry attempts for transient image generation failures.
      default: 4
      selector:
        number:
          min: 1
          max: 10
          step: 1
          mode: box

    initial_backoff_seconds:
      name: Initial backoff (seconds)
      description: Initial wait before retrying image generation after a transient failure.
      default: 2
      selector:
        number:
          min: 0.1
          max: 120
          step: 0.1
          mode: box

    max_backoff_seconds:
      name: Max backoff (seconds)
      description: Upper limit for exponential backoff between image-generation retries.
      default: 30
      selector:
        number:
          min: 0.1
          max: 300
          step: 0.1
          mode: box

    archive_dir:
      name: Archive directory
      description: >
        Directory to save dated image archives. Defaults to /media/forecats.
      default: "/media/forecats"
      selector:
        text: {}

    display_profile:
      name: Display profile
      description: >
        Color profile to optimize the image for your display. Leave blank to
        keep the original image colors.
      default: ""
      selector:
        select:
          options:
            - label: "None (original colors)"
              value: ""
            - label: "Spectra 6 (e-ink)"
              value: "spectra6"

# Fires at the top of every hour; the condition below gates it to scheduled slots.
trigger:
  - trigger: time_pattern
    minutes: "0"

variables:
  weather_entity_id: !input weather_entity
  display_profile_input: !input display_profile
  input_image_dir_input: !input input_image_dir
  trigger_time_str: !input trigger_time
  check_interval_hours_var: !input check_interval_hours

# Only proceed when the current hour is a scheduled generation slot.
# Uses the same modulo logic as the ESPHome device so they stay in sync.
condition:
  - condition: template
    value_template: >
      {% set start_hour = trigger_time_str.split(':')[0] | int %}
      {% set interval = check_interval_hours_var | int %}
      {% set current_hour = now().hour %}
      {% set hours_since_start = ((current_hour - start_hour) % 24 + 24) % 24 %}
      {{ hours_since_start % interval == 0 }}

action:
  - action: weather.get_forecasts
    target:
      entity_id: !input weather_entity
    data:
      type: daily
    response_variable: todays_forecast
  - action: forecats.generate_pet_picture
    data:
      gemini_api_key: !input gemini_api_key
      location: !input location
      forecast: "{{ todays_forecast[weather_entity_id].forecast[0] }}"
      temperature_unit: "{{ state_attr(weather_entity_id, 'temperature_unit') }}"
      pets: !input pets
      input_image_dir: "{{ input_image_dir_input if input_image_dir_input != '' else none }}"
      input_image_paths: !input input_image_paths
      art_styles: !input art_styles
      image_gen_aspect_ratio: !input image_gen_aspect_ratio
      image_gen_resolution: !input image_gen_resolution
      final_image_size: !input final_image_size
      activity_model: !input activity_model
      image_model: !input image_model
      max_image_retries: !input max_image_retries
      initial_backoff_seconds: !input initial_backoff_seconds
      max_backoff_seconds: !input max_backoff_seconds
      display_profile: "{{ display_profile_input if display_profile_input != '' else none }}"
      archive_dir: !input archive_dir

mode: single

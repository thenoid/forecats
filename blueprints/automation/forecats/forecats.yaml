blueprint:
  name: Daily Forecats
  description: >
    Generate a daily AI weather-themed illustration of your pets using the
    Forecats integration. Fetches today's forecast from a weather entity and
    calls the `forecats.generate_pet_picture` service on a configurable schedule.

    **Setup required:** Add the Forecats integration via Settings → Integrations
    first. Your API key, location, image directory, and display settings are
    configured there and used automatically. The fields below only need to be
    filled in if you want to override the integration defaults for this
    specific automation.
  domain: automation
  source_url: https://github.com/jwardbond/forecats/blob/master/blueprints/automation/forecats/forecats.yaml
  input:
    # -------------------------------------------------------------------------
    # Required
    # -------------------------------------------------------------------------
    trigger_time:
      name: Generation time
      description: >
        Time of day to generate the first image each day. The hour portion is
        used as the anchor for repeat intervals — e.g. if set to 05:00 with a
        6-hour interval, images are generated at 05:00, 11:00, 17:00, 23:00.
      default: "05:00:00"
      selector:
        time: {}

    check_interval_hours:
      name: Check interval
      description: >
        How many hours between image regenerations. Set to 24 for once daily.
        Match this to the check_interval_hours substitution in your ESPHome
        device config so the device and automation stay in sync.
      default: 24
      selector:
        number:
          min: 1
          max: 24
          step: 1
          unit_of_measurement: hours
          mode: box

    weather_entity:
      name: Weather entity
      description: The weather entity to pull today's forecast from (e.g. weather.forecast_home).
      selector:
        entity:
          domain: weather

    pets:
      name: Pets
      description: >
        List of pets. Each entry must have a `name` and `description`, and
        optionally a `type` (defaults to "cat"). Example:

          - name: Milo
            type: cat
            description: An orange tabby who loves blankets
          - name: Brutus
            type: dog
            description: A large black lab who is always hungry
      selector:
        object: {}

    art_styles:
      name: Art styles
      description: List of art styles to randomly choose from each day.
      default:
        - comic book
        - anime
        - pixar
        - watercolor
        - ghibli
        - disney
      selector:
        object: {}

    # -------------------------------------------------------------------------
    # Overrides (leave blank to use the value from the Forecats config entry)
    # -------------------------------------------------------------------------
    override_gemini_api_key:
      name: "[Override] Gemini API key"
      description: Leave blank to use the key from the Forecats config entry.
      default: ""
      selector:
        text:
          type: password

    override_location:
      name: "[Override] Location"
      description: Leave blank to use the location from the Forecats config entry.
      default: ""
      selector:
        text: {}

    override_input_image_dir:
      name: "[Override] Input image directory"
      description: Leave blank to use the directory from the Forecats config entry.
      default: ""
      selector:
        text: {}

    override_image_gen_aspect_ratio:
      name: "[Override] Image aspect ratio"
      description: Leave blank to use the value from the Forecats config entry.
      default: ""
      selector:
        select:
          options:
            - label: "(use config entry default)"
              value: ""
            - "1:1"
            - "3:4"
            - "4:3"
            - "9:16"
            - "16:9"

    override_image_gen_resolution:
      name: "[Override] Image resolution"
      description: Leave blank to use the value from the Forecats config entry.
      default: ""
      selector:
        select:
          options:
            - label: "(use config entry default)"
              value: ""
            - "1K"
            - "2K"
            - "4K"

    override_final_image_size:
      name: "[Override] Final image size"
      description: Leave blank to use the value from the Forecats config entry (e.g. "800x480").
      default: ""
      selector:
        text: {}

    override_display_profile:
      name: "[Override] Display profile"
      description: Leave blank to use the value from the Forecats config entry.
      default: ""
      selector:
        select:
          options:
            - label: "(use config entry default)"
              value: ""
            - label: "None (original colors)"
              value: "none"
            - label: "Spectra 6 (e-ink)"
              value: "spectra6"

# Fires at the top of every hour; the condition below gates it to scheduled slots.
trigger:
  - trigger: time_pattern
    minutes: "0"

variables:
  weather_entity_id: !input weather_entity
  trigger_time_str: !input trigger_time
  check_interval_hours_var: !input check_interval_hours
  override_gemini_api_key: !input override_gemini_api_key
  override_location: !input override_location
  override_input_image_dir: !input override_input_image_dir
  override_image_gen_aspect_ratio: !input override_image_gen_aspect_ratio
  override_image_gen_resolution: !input override_image_gen_resolution
  override_final_image_size: !input override_final_image_size
  override_display_profile: !input override_display_profile

# Only proceed when the current hour is a scheduled generation slot.
# Uses the same modulo logic as the ESPHome device so they stay in sync.
condition:
  - condition: template
    value_template: >
      {% set start_hour = trigger_time_str.split(':')[0] | int %}
      {% set interval = check_interval_hours_var | int %}
      {% set current_hour = now().hour %}
      {% set hours_since_start = ((current_hour - start_hour) % 24 + 24) % 24 %}
      {{ hours_since_start % interval == 0 }}

action:
  - action: weather.get_forecasts
    target:
      entity_id: !input weather_entity
    data:
      type: daily
    response_variable: todays_forecast
  - action: forecats.generate_pet_picture
    data:
      # Dynamic — always from the weather entity
      forecast: "{{ todays_forecast[weather_entity_id].forecast[0] }}"
      temperature_unit: "{{ state_attr(weather_entity_id, 'temperature_unit') }}"
      # Always from blueprint inputs
      pets: !input pets
      art_styles: !input art_styles
      # Overrides — omitted (null) when blank so the service falls back to config entry values
      gemini_api_key: "{{ override_gemini_api_key if override_gemini_api_key != '' else none }}"
      location: "{{ override_location if override_location != '' else none }}"
      input_image_dir: "{{ override_input_image_dir if override_input_image_dir != '' else none }}"
      image_gen_aspect_ratio: "{{ override_image_gen_aspect_ratio if override_image_gen_aspect_ratio != '' else none }}"
      image_gen_resolution: "{{ override_image_gen_resolution if override_image_gen_resolution != '' else none }}"
      final_image_size: "{{ override_final_image_size if override_final_image_size != '' else none }}"
      display_profile: "{{ none if override_display_profile == '' else (none if override_display_profile == 'none' else override_display_profile) }}"

mode: single
